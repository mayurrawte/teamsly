name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.0). Leave empty for HEAD.'
        required: false

jobs:
  build:
    name: Build (${{ matrix.os }})
    # GITHUB_TOKEN defaults to read-only since 2023. electron-builder needs
    # contents:write to create the GitHub Release and upload artifacts.
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile Electron main
        run: npm run electron:compile

      - name: Build & publish desktop app
        # Only export signing/notarization vars when the secret exists.
        # electron-builder treats an empty CSC_LINK as a literal file path and
        # fails with "not a file" instead of falling back to unsigned.
        shell: bash
        run: |
          if [ -n "$_APPLE_ID" ]; then export APPLE_ID="$_APPLE_ID"; fi
          if [ -n "$_APPLE_APP_SPECIFIC_PASSWORD" ]; then export APPLE_APP_SPECIFIC_PASSWORD="$_APPLE_APP_SPECIFIC_PASSWORD"; fi
          if [ -n "$_APPLE_TEAM_ID" ]; then export APPLE_TEAM_ID="$_APPLE_TEAM_ID"; fi
          if [ -n "$_CSC_LINK" ]; then export CSC_LINK="$_CSC_LINK"; fi
          if [ -n "$_CSC_KEY_PASSWORD" ]; then export CSC_KEY_PASSWORD="$_CSC_KEY_PASSWORD"; fi
          npm run electron:release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          _APPLE_ID: ${{ secrets.APPLE_ID }}
          _APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          _APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          _CSC_LINK: ${{ secrets.CSC_LINK }}
          _CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: teamsly-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/latest*.yml
          if-no-files-found: ignore
          retention-days: 14
