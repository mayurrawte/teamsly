name: Bug report
description: Report something that's broken or behaving unexpectedly
labels: ["bug"]
body:
  - type: input
    id: title
    attributes:
      label: One-line summary
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: false
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can someone else hit the same bug?
    validations:
      required: false
  - type: input
    id: env
    attributes:
      label: Environment
      description: e.g. macOS 15 desktop v0.1.0, or Chrome on Windows web
    validations:
      required: false
