<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#2E2A6F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- node-graph detail: two filled circles connected by a line, top-left -->
  <circle cx="2.5" cy="3.5" r="1.2" fill="#2E2A6F" stroke="none" />
  <circle cx="6.2" cy="1.4" r="0.9" fill="#2E2A6F" stroke="none" />
  <line x1="3.5" y1="3" x2="5.5" y2="2" stroke="#2E2A6F" stroke-width="1" />
  <!-- speech bubble: rounded rectangle -->
  <rect x="3" y="5" width="18" height="13" rx="3" />
  <!-- bubble tail pointing down-left -->
  <polyline points="5,18 3,22 7,18" stroke-linejoin="round" />
  <!-- terminal prompt inside bubble: chevron > and underscore _ -->
  <polyline points="8,10.5 10.5,12 8,13.5" stroke-linejoin="round" />
  <line x1="12.5" y1="13.5" x2="15.5" y2="13.5" />
</svg>
